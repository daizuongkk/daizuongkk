name: Grid snake

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 */2 * * *"
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3.1.0
        with:
          github_user_name: daizuongkk
          outputs: |
            dist/grid-snake.svg
            dist/grid-snake-dark.svg?palette=github-dark
        env:
          # a GitHub token is required to fetch the contribution calendar from GitHub API
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull
        run: git pull origin main

      - uses: stefanzweifel/git-auto-commit-action@v4.15.1
        with:
          commit_message: "grid snake"
          file_pattern: "dist/*.svg"
          commit_user_name: daizuongkk
          commit_user_email: trongdaidt147@gmail.com
          commit_author: Nguyễn Trọng Đại <trongdaidt147@gmail.com>

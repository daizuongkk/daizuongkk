on:
  push:
  pull_request:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
jobs:
  build:
    name: Make gitartwork SVG
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jasineri/gitartwork@v1
        with:
          user_name: daizuongkk
          text: daizuongkk
      - name: Set Git User
        run: |
          git config user.name "daizuongkk"
          git config user.email "trongdaidt147@gmail.com"
      - uses: jasineri/simple-push-action@v1
